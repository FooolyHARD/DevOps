---
- name: Bootstrap Docker and Yandex CR auth on the VM
  hosts: vm
  become: true
  gather_facts: true

  vars:
    docker_users:
      - "{{ ansible_user }}"

  tasks:
    - name: Wait for cloud-init to finish
      ansible.builtin.wait_for:
        path: /var/lib/cloud/instance/boot-finished
        timeout: 600

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - jq
        state: present
        update_cache: true

    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Fetch Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add users to the docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"

    - name: Reset SSH connection so new docker group applies
      ansible.builtin.meta: reset_connection

    - name: Install Yandex Cloud CLI (provides docker-credential-yc)
      ansible.builtin.shell: |
        curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh \
          | bash -s -- -i /opt/yandex-cloud -n
      args:
        creates: /opt/yandex-cloud/bin/yc

    - name: Symlink yc into /usr/local/bin
      ansible.builtin.file:
        src: /opt/yandex-cloud/bin/yc
        dest: /usr/local/bin/yc
        state: link

    - name: Remove invalid docker-credential-yc symlink created by older bootstrap
      ansible.builtin.file:
        path: /usr/local/bin/docker-credential-yc
        state: absent

    - name: Ensure ~/.docker exists for {{ ansible_user }}
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.docker"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure /root/.docker exists
      ansible.builtin.file:
        path: /root/.docker
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Disable Yandex Docker credential helper for root
      ansible.builtin.copy:
        dest: /root/.docker/config.json
        owner: root
        group: root
        mode: "0600"
        content: |
          {}
