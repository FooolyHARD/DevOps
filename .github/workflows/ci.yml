name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run backend tests
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

  backend-build:
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: python -m pip install -e .
      - name: Compile backend sources
        run: python -m compileall app




  frontend-test:
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm test -- --coverage

  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  docker-publish:
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/lab3')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Yandex Container Registry
        run: |
          printf '%s' '${{ secrets.YC_SA_JSON }}' | docker login --username json_key --password-stdin cr.yandex

      - name: Build backend image
        run: |
          docker build \
            -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/marine-toxicity-backend:${{ github.sha }} \
            -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/marine-toxicity-backend:latest \
            backend

      - name: Push backend image
        run: |
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/marine-toxicity-backend:${{ github.sha }}
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/marine-toxicity-backend:latest
